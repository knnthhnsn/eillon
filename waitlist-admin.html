<!DOCTYPE html>
<html lang="en-DK">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>EILLON — Waitlist Admin</title>
  <link rel="stylesheet" href="styles.min.css?v=182" />
  <style>
    body { padding: 48px 24px 80px; background: var(--bg); color: var(--ink); }
    .admin { max-width: 1240px; margin: 0 auto; }
    .admin__head { margin-bottom: 32px; }
    .admin__head h1 {
      font-family: var(--serif);
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 300;
      margin: 0 0 8px;
    }
    .admin__head p { margin: 0; color: var(--ink-soft); font-family: var(--serif); font-style: italic; }
    .admin__gate {
      display: flex;
      gap: 12px;
      align-items: end;
      max-width: 520px;
      margin-bottom: 28px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }
    .admin__gate label {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }
    .admin__gate input {
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      font: inherit;
      font-size: 15px;
      padding: 8px 0;
      color: var(--ink);
      outline: none;
    }
    .admin__gate button {
      padding: 10px 16px;
      border: 1px solid var(--ink);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .admin__status { min-height: 24px; color: var(--ink-soft); font-family: var(--serif); font-style: italic; }
    .admin__meta { margin: 0 0 16px; font-size: 13px; color: var(--ink-soft); }
    .admin__table-wrap { overflow-x: auto; border: 1px solid var(--line); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--line-soft); vertical-align: top; }
    th {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-faint);
      font-weight: 500;
    }
    tr:last-child td { border-bottom: 0; }
    .admin__selection { min-width: 230px; font-family: var(--serif); }
    .admin__intent { white-space: nowrap; }
    .admin__empty { padding: 32px 16px; text-align: center; color: var(--ink-soft); font-family: var(--serif); font-style: italic; }
    @media (max-width: 700px) {
      body { padding: 28px 16px 56px; }
      .admin__gate { flex-direction: column; align-items: stretch; }
      .admin__gate input { font-size: 16px; }
      th, td { padding: 12px; }
    }
  </style>
</head>
<body>
  <main class="admin">
    <div class="admin__head">
      <span class="eyebrow">EILLON studio</span>
      <h1>Waitlist signups</h1>
      <p>Exact chapter, format, price, intent, and entry point for every signup.</p>
    </div>

    <form class="admin__gate" id="gateForm">
      <label>
        Admin key
        <input type="password" id="adminKey" autocomplete="current-password" required />
      </label>
      <button type="submit">Load</button>
    </form>

    <p class="admin__status" id="status" aria-live="polite"></p>
    <p class="admin__meta" id="meta" hidden></p>

    <div class="admin__table-wrap" id="tableWrap" hidden>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Signed up for</th>
            <th>Intent</th>
            <th>Entry point</th>
            <th>Page</th>
            <th>Last activity</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </main>

  <script>
    const storageKey = 'eillon-waitlist-admin-key';
    const gateForm = document.getElementById('gateForm');
    const adminKeyInput = document.getElementById('adminKey');
    const statusEl = document.getElementById('status');
    const metaEl = document.getElementById('meta');
    const tableWrap = document.getElementById('tableWrap');
    const rowsEl = document.getElementById('rows');

    const formatDate = (value) => {
      try {
        return new Intl.DateTimeFormat('en-GB', {
          dateStyle: 'medium',
          timeStyle: 'short',
          timeZone: 'Europe/Copenhagen',
        }).format(new Date(value));
      } catch {
        return value;
      }
    };

    const appendCell = (row, value, className = '') => {
      const cell = document.createElement('td');
      cell.textContent = value || '—';
      if (className) cell.className = className;
      row.appendChild(cell);
    };

    const intentLabels = {
      next_restock: 'Next restock',
      future_release: 'Future release',
      studio_study: 'Studio study',
      letter: 'The Letter',
    };

    const fallbackSelection = (signup) => {
      const size = signup.size === 'sample' ? '2 ml sample' : signup.size ? `${signup.size} ml` : null;
      return [signup.product_slug, size].filter(Boolean).join(' · ');
    };

    const renderRows = (signups) => {
      rowsEl.replaceChildren();
      if (!signups.length) {
        tableWrap.hidden = false;
        const row = document.createElement('tr');
        const cell = document.createElement('td');
        cell.colSpan = 7;
        cell.className = 'admin__empty';
        cell.textContent = 'No signups yet.';
        row.appendChild(cell);
        rowsEl.appendChild(row);
        return;
      }

      signups.forEach((signup) => {
        const row = document.createElement('tr');
        appendCell(row, signup.name);
        appendCell(row, signup.email);
        appendCell(row, signup.selection_label || fallbackSelection(signup), 'admin__selection');
        appendCell(row, intentLabels[signup.signup_intent] || signup.signup_intent, 'admin__intent');
        appendCell(row, signup.source);
        appendCell(row, signup.page_path);
        appendCell(row, formatDate(signup.updated_at || signup.created_at));
        rowsEl.appendChild(row);
      });
      tableWrap.hidden = false;
    };

    const loadSignups = async (key) => {
      statusEl.textContent = 'Loading…';
      metaEl.hidden = true;
      tableWrap.hidden = true;

      const res = await fetch('/api/waitlist-admin', {
        headers: { 'x-admin-key': key },
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        statusEl.textContent = data.error === 'Unauthorized'
          ? 'Wrong admin key.'
          : 'Could not load signups.';
        return;
      }

      try {
        sessionStorage.setItem(storageKey, key);
      } catch {
        // Ignore storage failures.
      }

      statusEl.textContent = '';
      metaEl.textContent = `${data.count} signup${data.count === 1 ? '' : 's'}`;
      metaEl.hidden = false;
      renderRows(data.signups || []);
    };

    gateForm.addEventListener('submit', (e) => {
      e.preventDefault();
      loadSignups(adminKeyInput.value.trim());
    });

    try {
      const saved = sessionStorage.getItem(storageKey);
      if (saved) {
        adminKeyInput.value = saved;
        loadSignups(saved);
      }
    } catch {
      // Gate still works without storage.
    }
  </script>
</body>
</html>
